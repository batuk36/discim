workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic

    environment:
      groups:
        - ios
      flutter: stable

    scripts:
      - name: Build iOS IPA
        script: |
          set -e
          keychain initialize

          echo ">>> Fetching signing files"
          app-store-connect fetch-signing-files \
            com.discim.app \
            --type IOS_APP_STORE \
            --create

          echo ">>> Adding certificates to keychain"
          keychain add-certificates

          echo ">>> Applying provisioning profiles"
          xcode-project use-profiles

          echo ">>> CM_EXPORT_DIR = $CM_EXPORT_DIR"
          ls -la "$CM_EXPORT_DIR" || echo "WARNING: CM_EXPORT_DIR not found"

          flutter pub get

          if [ -f "$CM_EXPORT_DIR/ExportOptions.plist" ]; then
            echo ">>> Building with generated ExportOptions.plist"
            flutter build ipa --release \
              --export-options-plist="$CM_EXPORT_DIR/ExportOptions.plist"
          else
            echo ">>> ExportOptions.plist not found, building without it"
            flutter build ipa --release
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false
