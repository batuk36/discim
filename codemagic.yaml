workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic

    environment:
      groups:
        - ios
      flutter: stable

    scripts:
      - name: Build iOS IPA
        script: |
          keychain initialize
          app-store-connect fetch-signing-files \
            com.discim.app \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
          flutter pub get
          flutter build ipa --release \
            --export-options-plist=$CM_EXPORT_DIR/ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
